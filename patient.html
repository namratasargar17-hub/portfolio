<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <div class="container">
        <div class="row mt-4 justify-content-center p-3  ">
            <div class="col-lg-6 border border border-4 border-dark rounded shadow">
                <h2> Patient Registration <Form></Form></h2>
                <h7>Please fill in your details to register as a new patient. </h7>

                 <div class="row mb-6">
                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" name="" id="" class=" form-control" placeholder="Enter your First Name">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="" id="" class="form-control" placeholder="Enter your Last Name">
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Email Address</label>
                        <input type="text" name="" id="" class="form-control" placeholder="Enter Your Email Address">
                    </div>
                   
                 </div>
                    <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="text" name="" id="" class=" form-control" placeholder="Enter your Phone Number">
                    </div>

                   
                    

                    <div class="col-md-6">
                        <label class="form-label">Date of Birth</label>
                        <input type="datetime" name="" id="" class="form-control" placeholder="DD/MM/YYYY">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Gender</label><br>
                        <input type="radio" name="title" id="">Male 
                        <input type="radio" name="title" id="" >Female
                        <input type="radio" name="title" id="" >Other
                    </div>
                     <div class="col-md-12">
                        <label class="form-label">Email Address</label>
                        <input type="text" name="" id="" class="form-control" placeholder="Enter Your Email Address">
                    </div>
                    
                    </div>
                    
                    <div class="col-md-8 mb-3">
                        <label class="form-label">Address</label>
                        <textarea type="text" id="text" class="form-control" placeholder="Please Enter your address Here"></textarea>
                    </div>
                
                     <div class="col-md-12">
                        <label class="form-label">Emergency Contact Number</label>
                        <input type="number" name="" id="" class="form-control" placeholder="+1(555) 123-6543">
                    </div>
        
                    <div class="mb-3">
                        <input type="checkbox">I consent to the pricessing of my personal data in accordance with the privacy policy.
                    </div>  
                 
                    <div class="text-center"><button type="submit" class="btn btn-primary mb-3">Register</button></div> 
                
                            
            </div>
        </div>
     </div>
</body>
</html>
